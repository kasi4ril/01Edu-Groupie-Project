<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groupie Tracker</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<header>
    <h1>Groupie Tracker</h1>
</header>

<main class="container">

    <form action="/" method="GET" class="filter-form">

    <fieldset>
        <legend><strong>Creation Year</strong></legend>

        From:
        <input type="number" name="creationFrom">

        To:
        <input type="number" name="creationTo">
    </fieldset>

    <br>

    <fieldset>
        <legend><strong>First Album Year</strong></legend>

        From:
        <input type="number" name="albumFrom">

        To:
        <input type="number" name="albumTo">
    </fieldset>

    <br>

    <fieldset>
        <legend><strong>Members</strong></legend>

        <label><input type="checkbox" name="members" value="1">1</label>
        <label><input type="checkbox" name="members" value="2">2</label>
        <label><input type="checkbox" name="members" value="3">3</label>
        <label><input type="checkbox" name="members" value="4">4</label>
        <label><input type="checkbox" name="members" value="5">5</label>
        <label><input type="checkbox" name="members" value="6">6</label>
        <label><input type="checkbox" name="members" value="7">7</label>
        <label><input type="checkbox" name="members" value="8">8</label>
    </fieldset>

    <br>

    <fieldset>
        <legend><strong>Locations</strong></legend>

        <!-- We'll improve this later with dynamic locations -->
        <input type="text" name="location" placeholder="Enter location">
    </fieldset>

    <br>

    <button type="submit">
        Apply Filters
    </button>

</form>

<hr>

    {{ range . }}
    <div class="card">

        <img src="{{ .Image }}" alt="{{ .Name }}">

        <h2>{{ .Name }}</h2>

        <p>
            <strong>Created:</strong>
            {{ .CreationDate }}
        </p>

        <p>
            <strong>First Album:</strong>
            {{ .FirstAlbum }}
        </p>

        <h3>Members</h3>

        <ul>
            {{ range .Members }}
            <li>{{ . }}</li>
            {{ end }}
        </ul>

        <a class="button" href="/artist?id={{ .ID }}">
            View Details
        </a>

    </div>
    {{ end }}

</main>

</body>
</html>
